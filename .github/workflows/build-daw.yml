name: Build DawApp

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libgtk-3-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libwebkit2gtk-4.1-dev \
            libcurl4-openssl-dev

      - name: Configure CMake
        run: cmake -S examples/CMake/DawApp -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build DawAppExample
        run: cmake --build build --target DawAppExample -j$(nproc)

      - name: Locate built binary
        id: find-binary
        run: |
          BINARY=$(find build -name "Music Theory DAW" -type f -executable 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            echo "Binary not found!" >&2
            exit 1
          fi
          echo "path=$BINARY" >> "$GITHUB_OUTPUT"

      - name: Upload DawApp artifact
        uses: actions/upload-artifact@v4
        with:
          name: DawAppExample-Linux
          path: ${{ steps.find-binary.outputs.path }}
          if-no-files-found: error

  android:
    name: Android APK (arm64-v8a)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libfreetype-dev \
            libfontconfig-dev \
            libasound2-dev \
            libcurl4-openssl-dev \
            python3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Locate Android NDK
        id: ndk
        run: |
          NDK=$(ls -d /usr/local/lib/android/sdk/ndk/* 2>/dev/null | sort -V | tail -1)
          if [ -z "$NDK" ]; then
            NDK="$ANDROID_NDK_HOME"
          fi
          if [ -z "$NDK" ] || [ ! -d "$NDK" ]; then
            echo "NDK not found!" >&2
            exit 1
          fi
          echo "path=$NDK" >> "$GITHUB_OUTPUT"

      - name: Build Android APK
        run: |
          bash examples/CMake/DawApp/build-android-apk.sh \
            "${{ steps.ndk.outputs.path }}" \
            "$ANDROID_HOME"

      - name: Locate APK
        id: find-apk
        run: |
          APK=$(find examples/CMake/DawApp/android-apk -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found!" >&2
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: DawAppExample-Android-APK
          path: ${{ steps.find-apk.outputs.path }}
          if-no-files-found: error
