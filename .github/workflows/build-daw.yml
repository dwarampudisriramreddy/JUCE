name: Build DawApp

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libgtk-3-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libwebkit2gtk-4.1-dev \
            libcurl4-openssl-dev

      - name: Configure CMake
        run: cmake -S examples/CMake/DawApp -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build DawAppExample
        run: cmake --build build --target DawAppExample -j$(nproc)

      - name: Locate built binary
        id: find-binary
        run: |
          BINARY=$(find build -name "Music Theory DAW" -type f -executable 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            echo "Binary not found!" >&2
            exit 1
          fi
          echo "path=$BINARY" >> "$GITHUB_OUTPUT"

      - name: Upload DawApp artifact
        uses: actions/upload-artifact@v4
        with:
          name: DawAppExample-Linux
          path: ${{ steps.find-binary.outputs.path }}
          if-no-files-found: error

  android:
    name: Android arm64-v8a
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host dependencies (for juceaide bootstrapping)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libfreetype-dev \
            libfontconfig-dev \
            libasound2-dev \
            libcurl4-openssl-dev

      - name: Debug pkg-config and freetype
        run: |
          pkg-config --exists freetype2 && echo "freetype2 found" || echo "freetype2 NOT found"
          pkg-config --cflags freetype2
          pkg-config --variable pc_path pkg-config
          find /usr -name "freetype2.pc" 2>/dev/null
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_LIBDIR=$PKG_CONFIG_LIBDIR"
          echo "PKG_CONFIG=$PKG_CONFIG"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Locate Android NDK
        id: ndk
        run: |
          NDK=$(ls -d /usr/local/lib/android/sdk/ndk/* 2>/dev/null | sort -V | tail -1)
          if [ -z "$NDK" ]; then
            # fallback: try ANDROID_NDK_HOME
            NDK="$ANDROID_NDK_HOME"
          fi
          if [ -z "$NDK" ] || [ ! -d "$NDK" ]; then
            echo "NDK not found!" >&2
            exit 1
          fi
          echo "path=$NDK" >> "$GITHUB_OUTPUT"

      - name: Configure CMake for Android
        run: |
          cmake -S examples/CMake/DawApp -B build-android \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_NDK=${{ steps.ndk.outputs.path }} \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_STL_TYPE=c++_shared \
            -DCMAKE_ANDROID_API=26

      - name: Build DawAppExample for Android
        run: cmake --build build-android --target DawAppExample -j$(nproc)

      - name: Locate built library
        id: find-lib
        run: |
          LIB=$(find build-android -name "libDawAppExample.so" -type f 2>/dev/null | head -1)
          if [ -z "$LIB" ]; then
            echo "Library not found!" >&2
            exit 1
          fi
          echo "path=$LIB" >> "$GITHUB_OUTPUT"

      - name: Upload Android native library
        uses: actions/upload-artifact@v4
        with:
          name: DawAppExample-Android-arm64-v8a
          path: ${{ steps.find-lib.outputs.path }}
          if-no-files-found: error
