name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build DemoRunner APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: examples/DemoRunner/Builds/Android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug_ 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner-APK
          path: examples/DemoRunner/Builds/Android/app/build/outputs/apk/debug_/debug/*.apk
          if-no-files-found: error
