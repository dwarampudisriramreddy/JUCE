name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build DemoRunner APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create debug keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkey -v -keystore "$HOME/.android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        working-directory: examples/DemoRunner/Builds/Android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug_ 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemoRunner-APK
          path: examples/DemoRunner/Builds/Android/app/build/outputs/apk/debug_/debug/*.apk
          if-no-files-found: error
